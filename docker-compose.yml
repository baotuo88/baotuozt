services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${COMPOSE_PROJECT_NAME:-baotuo}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT:-6003}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-baotuo}-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6004}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ${COMPOSE_PROJECT_NAME:-baotuo}-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    command: ["node", "dist/migrate.js"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ${COMPOSE_PROJECT_NAME:-baotuo}-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - '${API_PORT:-6002}:3000'
    volumes:
      - api_storage:/app/apps/api/storage

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ${COMPOSE_PROJECT_NAME:-baotuo}-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    command: ["node", "dist/worker.js"]
    volumes:
      - api_storage:/app/apps/api/storage

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_IMAGE_HOSTS: ${NEXT_PUBLIC_IMAGE_HOSTS}
    container_name: ${COMPOSE_PROJECT_NAME:-baotuo}-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_IMAGE_HOSTS: ${NEXT_PUBLIC_IMAGE_HOSTS}
    ports:
      - '${WEB_PORT:-6001}:3001'

volumes:
  pgdata:
  redisdata:
  api_storage:
